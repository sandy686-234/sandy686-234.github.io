remote_theme: mmistakes/minimal-mistakes@4.24.0
theme: minimal-mistakes-jekyll
# Site settings
title: "Huan Zhang"
email: huan.zhang.2024@mumail.ie
description: >-
  Ph.D. candidate in Computer Science at Maynooth University, researching formal verification, FSMs, and robotics.
baseurl: ""
url: "https://sandy686-234.github.io"

# Build settings
markdown: kramdown
theme: minimal-mistakes-jekyll

# Navigation
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single

# Set homepage to about.md
collections:
  pages:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Show about.md as homepage
defaults:
  - scope:
      path: ""
    values:
      permalink: /
      layout: single
      author_profile: true
      title: "About Me"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

