remote_theme: "mmistakes/minimal-mistakes@4.24.0"

title: "Huan Zhang"
description: "Ph.D. candidate at Maynooth University"
baseurl: ""
url: "https://sandy686-234.github.io"
markdown: kramdown

collections:
  pages:
    output: true
    permalink: /:path/
  publications:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
    values:
      permalink: /
      layout: single
      author_profile: true
      title: "About Me"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from

